<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inteligencia Operativa - Biomedicina</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#020617',
                        panel: '#0f172a',
                        primary: '#38bdf8', 
                        success: '#10b981', 
                        warning: '#f59e0b', 
                        danger: '#f43f5e',  
                        annual: '#8b5cf6',  
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-dark text-slate-200 p-0 md:p-8 relative min-h-screen">

    <div id="loginScreen" class="absolute inset-0 bg-dark z-50 flex flex-col items-center justify-center p-4">
        <div class="bg-panel p-8 rounded-xl border border-slate-700 shadow-[0_10px_30px_rgba(0,0,0,0.8)] max-w-md w-full text-center">
            <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 text-primary text-3xl">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Acceso Restringido</h2>
            <p class="text-slate-400 mb-6 text-sm">Ingrese el código de autorización para ver los indicadores operativos de Ingeniería Biomédica.</p>
            
            <input type="password" id="accessCodeInput" placeholder="Código PIN" class="w-full bg-dark text-white border border-slate-600 rounded-lg px-4 py-3 mb-4 outline-none focus:border-primary text-center tracking-widest text-lg transition-colors">
            
            <button id="loginBtn" class="w-full bg-primary hover:bg-sky-400 text-dark font-bold py-3 px-4 rounded-lg transition-colors shadow-[0_0_15px_rgba(56,189,248,0.3)]">
                Acceder al Dashboard
            </button>
            <p id="loginError" class="text-danger text-sm mt-4 hidden"><i class="fa-solid fa-circle-exclamation mr-1"></i> Código incorrecto.</p>
        </div>
    </div>

    <div id="mainDashboard" class="max-w-7xl mx-auto hidden flex-col gap-6">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-panel p-6 rounded-xl border border-slate-800 shadow-lg">
            <div>
                <h1 id="dashboardTitle" class="text-2xl md:text-3xl font-bold text-white tracking-tight">Inteligencia Operativa Biomédica</h1>
                <p class="text-slate-400 mt-1"><i class="fa-regular fa-hospital mr-2"></i>Hospital Regional • 54 Camas / 4 Quirófanos</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div id="syncIndicator" class="flex items-center text-sm font-medium text-amber-400 bg-amber-400/10 px-3 py-2 rounded-full border border-amber-400/20">
                    <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Esperando conexión...
                </div>

                <button id="btnAnual" class="bg-annual hover:bg-violet-400 text-white font-bold py-1.5 px-4 rounded-lg transition-colors shadow-[0_0_10px_rgba(139,92,246,0.3)] flex items-center border border-violet-500">
                    <i class="fa-solid fa-chart-line mr-2"></i>Vista Anual
                </button>

                <div class="flex items-center gap-2 bg-dark p-1.5 rounded-lg border border-slate-700 shadow-inner">
                    <label for="monthSelector" class="text-sm font-medium text-slate-300 ml-2"><i class="fa-regular fa-calendar mr-1"></i> Periodo:</label>
                    <select id="monthSelector" class="bg-dark text-white border-none rounded px-3 py-1 outline-none cursor-pointer focus:ring-0">
                        <option value="">Cargando...</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-panel p-5 rounded-xl border border-slate-800 flex flex-col justify-between">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-slate-400 text-sm font-medium" id="lbl-mp">Cumplimiento MP</p>
                    <div class="p-2 bg-slate-800/50 rounded-lg text-primary"><i class="fa-solid fa-clipboard-check"></i>
